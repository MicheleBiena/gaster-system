    <div id="scanlines"></div>
    <div id="vignette"></div>
    <div class="gs-glitch" id="glitch"></div>

    <div id="screen">
      <header id="site-header">
        <span id="header-title">
          <a href="../../index.html" style="color:var(--dim);text-decoration:none;font-size:0.7em;letter-spacing:0.1em;">← INDIETRO</a>

      <main id="hub">

        <div class="gs-section-label">// CONTENUTI //</div>

        <div id="chapter-nav">

          <a class="chapter-card done" href="survey.html">
            <span class="card-tag">SURVEY</span>

    <script src="../../assets/main.js"></script>
    <script>
      const saved = loadProgress();
      const scoreEl = document.getElementById('save-score');
      const statusEl = document.getElementById('survey-status');

      if (saved && saved.quiz_precap1 !== undefined) {
        scoreEl.textContent = `SURVEY_PROGRAM :: ${saved.quiz_precap1}/10 — COMPLETATO`;
        statusEl.textContent = `● ${saved.quiz_precap1}/10`;
        statusEl.style.color = 'var(--green)';
      } else {
        scoreEl.textContent = 'SURVEY NON ANCORA COMPLETATO';
      }
    </script>
