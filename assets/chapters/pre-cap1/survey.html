<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SURVEY_PROGRAM V12.25</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap");
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #000000;
        --text: #ffffff;
        --dim: #666666;
        --accent: #ffff00;
        --red: #ff3333;
        --green: #33ff33;
        --selected-bg: #ffffff;
        --selected-text: #000000;
        --scanline: rgba(255, 255, 255, 0.025);
        --tweet-bg: #0a0a0a;
        --tweet-border: #2a2a2a;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: "VT323", monospace;
        font-size: clamp(16px, 2vw, 24px);
        line-height: 1.5;
        overflow: hidden;
        cursor: crosshair;
      }
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        background: repeating-linear-gradient(
          to bottom,
          transparent 0px,
          transparent 2px,
          var(--scanline) 2px,
          var(--scanline) 4px
        );
        pointer-events: none;
        z-index: 9999;
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background: radial-gradient(
          ellipse at center,
          transparent 55%,
          rgba(0, 0, 0, 0.75) 100%
        );
        pointer-events: none;
        z-index: 9998;
      }
      #header {
        font-family: "Share Tech Mono", monospace;
        font-size: 0.6em;
        color: var(--dim);
        letter-spacing: 0.18em;
        text-transform: uppercase;
        width: 100%;
        max-width: 700px;
        margin-bottom: 0.4em;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      #viewer-count {
        color: var(--accent);
      }
      .wingdings {
        font-family: "Wingdings", serif;
      }
      #screen {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 1.5em 2em;
        gap: 0;
      }
      #container {
        width: 100%;
        max-width: 700px;
        display: flex;
        flex-direction: column;
      }
      #text-box {
        border: 3px solid var(--text);
        padding: 0.9em 1.1em;
        min-height: 5.2em;
        position: relative;
        background: var(--bg);
        letter-spacing: 0.02em;
        overflow: visible;
      }
      #text-content {
        white-space: pre-wrap;
        word-break: break-word;
        position: relative;
      }
      .cursor {
        display: inline-block;
        width: 0.55em;
        height: 1em;
        background: var(--text);
        vertical-align: text-bottom;
        animation: blink 0.9s step-end infinite;
        margin-left: 2px;
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0;
        }
      }
      #arrow-prompt {
        position: absolute;
        bottom: 0.3em;
        right: 0.7em;
        font-size: 1.3em;
        animation: blink 0.75s step-end infinite;
        display: none;
        color: var(--accent);
      }
      #score-bar {
        font-family: "Share Tech Mono", monospace;
        font-size: 0.58em;
        color: var(--dim);
        padding: 0.25em 0.5em;
        letter-spacing: 0.15em;
        display: none;
        justify-content: space-between;
        border-left: 3px solid var(--text);
        border-right: 3px solid var(--text);
        background: #050505;
      }
      #score-val {
        color: var(--accent);
      }
      #choices-box {
        border: 3px solid var(--text);
        border-top: none;
        background: var(--bg);
        display: none;
        flex-direction: column;
      }
      .choice-item {
        padding: 0.3em 1.1em;
        cursor: pointer;
        letter-spacing: 0.02em;
        transition:
          background 0.04s,
          color 0.04s;
        user-select: none;
      }
      .choice-item::before {
        content: "   ";
      }
      .choice-item:hover {
        background: #1a1a1a;
      }
      .choice-item.selected {
        background: var(--selected-bg);
        color: var(--selected-text);
      }
      .choice-item.selected::before {
        content: "▶  ";
      }
      .choice-item.correct {
        background: #003300;
        color: var(--green);
      }
      .choice-item.wrong {
        background: #220000;
        color: var(--red);
        text-decoration: line-through;
      }

      /* TWEET */
      #tweet-overlay {
        position: fixed;
        inset: 0;
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 5000;
        background: rgba(0, 0, 0, 0.82);
      }
      #tweet-card {
        background: var(--tweet-bg);
        border: 1px solid var(--tweet-border);
        width: min(580px, 90vw);
        padding: 1.2em 1.4em;
        font-family: "Share Tech Mono", monospace;
        font-size: clamp(11px, 1.2vw, 14px);
        box-shadow:
          0 0 60px rgba(255, 255, 255, 0.06),
          0 0 0 1px #1a1a1a;
        position: relative;
        animation: tweet-in 0.25s ease-out;
      }
      @keyframes tweet-in {
        from {
          transform: scale(0.92) translateY(12px);
          opacity: 0;
        }
        to {
          transform: scale(1) translateY(0);
          opacity: 1;
        }
      }
      .tweet-header {
        display: flex;
        align-items: center;
        gap: 0.7em;
        margin-bottom: 0.6em;
        border-bottom: 1px solid #1a1a1a;
        padding-bottom: 0.6em;
      }
      .tweet-avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: #111;
        border: 1px solid #333;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        flex-shrink: 0;
        color: #ff6b6b;
      }
      .tweet-name {
        color: #eee;
        font-weight: bold;
        font-size: 1.05em;
        letter-spacing: 0.05em;
      }
      .tweet-handle {
        color: #555;
        font-size: 0.88em;
        margin-top: 1px;
      }
      .tweet-x-logo {
        margin-left: auto;
        color: #333;
        font-size: 1.3em;
        font-family: serif;
      }
      .tweet-body {
        color: #ddd;
        line-height: 1.55;
        white-space: pre-wrap;
        font-size: 1.1em;
        letter-spacing: 0.03em;
        margin-bottom: 0.7em;
        padding: 0.3em 0;
      }
      .tweet-footer {
        color: #444;
        font-size: 0.82em;
        display: flex;
        gap: 1.5em;
        border-top: 1px solid #1a1a1a;
        padding-top: 0.5em;
      }
      .tweet-footer .likes {
        color: #555;
      }
      .tweet-close {
        position: absolute;
        top: 0.5em;
        right: 0.7em;
        color: #333;
        font-size: 0.8em;
        cursor: pointer;
        letter-spacing: 0.1em;
      }
      .tweet-close:hover {
        color: #888;
      }

      /* GLITCH */
      #glitch {
        position: fixed;
        inset: 0;
        background: var(--text);
        opacity: 0;
        pointer-events: none;
        z-index: 9997;
        transition: opacity 0.03s;
      }

      /* STATS */
      #stats-box {
        margin-top: 1.2em;
        font-family: "Share Tech Mono", monospace;
        font-size: 0.58em;
        color: var(--dim);
        letter-spacing: 0.1em;
        text-align: center;
        display: none;
        line-height: 2.1;
        width: 100%;
        max-width: 700px;
      }
      #stats-box .stat-label {
        color: var(--dim);
      }
      #stats-box .stat-value {
        color: var(--text);
      }
      #stats-box .stat-score {
        color: var(--accent);
        font-size: 1.3em;
      }

      /* CHAT NOTIFICATION */
      #chat-notif {
        width: 100%;
        max-width: 700px;
        font-family: "Share Tech Mono", monospace;
        font-size: clamp(10px, 1.05vw, 13px);
        color: #888;
        letter-spacing: 0.08em;
        opacity: 0;
        transition: opacity 0.6s;
        padding: 0.6em 1em;
        border: 1px solid #252525;
        border-left: 3px solid #444;
        background: #060606;
        display: none;
        line-height: 1.7;
        margin-top: 0;
      }
      #chat-notif .chat-prefix {
        color: #333;
        font-size: 0.82em;
        display: block;
        margin-bottom: 0.15em;
        letter-spacing: 0.2em;
      }
      #chat-notif .chat-user {
        color: #aaa;
      }
      #chat-notif .chat-msg {
        color: #666;
        font-style: italic;
      }
      #chat-notif .chat-comment {
        color: #444;
        display: block;
        margin-top: 0.2em;
        font-size: 0.88em;
      }

      /* SUBLIMINAL */
      #subliminal-box {
        width: 100%;
        max-width: 700px;
        min-height: 2.4em;
        font-family: "Share Tech Mono", monospace;
        font-size: clamp(10px, 1.1vw, 13px);
        color: #7a1010;
        letter-spacing: 0.22em;
        text-align: left;
        white-space: pre-wrap;
        line-height: 1.6;
        padding: 0.35em 0.6em;
        opacity: 0;
        transition: opacity 0.5s ease;
        pointer-events: none;
        text-transform: uppercase;
        border-left: 2px solid #3a0808;
        background: transparent;
      }
      #subliminal-box.visible {
        opacity: 1;
      }

      /* LOG — riga di sistema discreta in alto */
      #system-log {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        font-family: "Share Tech Mono", monospace;
        font-size: clamp(9px, 0.9vw, 11px);
        color: #1a1a1a;
        letter-spacing: 0.18em;
        padding: 0.3em 1em;
        pointer-events: none;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        z-index: 8000;
        transition: color 1.2s ease;
      }
      #system-log.pulse {
        color: #3a0808;
      }
    </style>
  </head>
  <body>
    <script>
      const TWITCH_CLIENT_ID = "5o9bcwsby8441081qq84a8vbccq2e7";

      const TWITCH_MY_CHANNEL = "TrainerFromHoenn";
      const TWITCH_CHANNEL = "gibbotto_x_red";
    </script>

    <div id="screen">
      <div id="header">
        <span id="header-left"
          >SURVEY_PROGRAM V12.25 //
          <span class="wingdings">GASTER</span> SYSTEM</span

          ><span class="cursor" id="cursor"></span>

    <div id="tweet-overlay">

          <span>🔗</span>

    <div id="system-log"></div>
    <div id="glitch"></div>

    <script>
      const TWEETS = [
        {
          text: "It's cold. It's as if everything had been enveloped in a black wind...\nYou didn't realize it yet, but... it seems that there's someone who wants to talk to you.",
          likes: 18423,
        },
        { text: "WELCOME.", likes: 24817 },
        { text: "HAVE YOU BEEN LOOKING\n\nFOR ME?", likes: 21034 },
        { text: "HOW WONDERFUL.", likes: 19652 },
        { text: "I\n\nHAVE BEEN LOOKING FOR YOU\n\nAS WELL", likes: 22891 },
        {
          text: "SO TO BE HERE\n\nFINALLY\n\nON THE VERGE OF CONNECTION",
          likes: 26340,
        },
        {
          text: "AFTER ALL\n\nYOU AND I,\n\nWE HAVE BOTH BEEN WAITING\n\nSUCH A VERY LONG TIME..",
          likes: 31027,
        },
        { text: "THANK YOU\n\nFOR WAITING SO LONG.", likes: 28443 },
        { text: "NOW !\n\nSHOW YOURSELF !\n\nDELTARUNE !", likes: 44201 },
        {
          text: "I LOOK FORWARD\n\nTO CREATING\n\nA NEW FUTURE\n\nWITH YOU.",
          likes: 51839,
        },
      ];

      const QUESTIONS = [
        {
          q: "In quale città abitano Sans e Papyrus?",
          opts: ["Snowdin", "Waterfall", "Hotland", "New Home"],
          correct: 0,
        },
        {
          q: "Quante rane ci sono nelle Rovine?",
          opts: ["2", "3", "4", "6"],
          correct: 2,
        },
        {
          q: "Di chi parla la mercante\nnello shop di Snowdin?",
          opts: [
            "Undyne e Alphys",
            "Sans e Papyrus",
            "Asgore e Toriel",
            "Monster Kid",
          ],
          correct: 1,
        },
        {
          q: "Qual è il vero nome completo di W. D. Gaster?",
          opts: [
            "Wing Dings Gaster",
            "Walter Darkner Gaster",
            "Wilhelm D. Gaster",
            "Wingdings Darkner",
          ],
          correct: 0,
        },
        {
          q: "Cosa sussurra Flowey prima dell'ultimo scontro\nnel True Pacifist?",
          opts: [
            '"I knew you would come back."',
            '"You\'re not like them."',
            '"I knew it would end this way."',
            '"You really ARE a pushover."',
          ],
          correct: 0,
        },
        {
          q: "Cosa vende Gerson nel Waterfall?",
          opts: [
            "Solo armi",
            "Solo armature",
            "Oggetti, armature e lore",
            "Solo oggetti curativi",
          ],
          correct: 2,
        },
        {
          q: "Nella True Lab, cosa contengono le vasche di DT?",
          opts: [
            "Anime dei mostri falliti",
            "Energia pura",
            "Esperimenti di Alphys su Flowey",
            "Frammenti del SOUL umano",
          ],
          correct: 0,
        },
        {
          q: "Qual è il numero di telefono di Papyrus?",
          opts: [
            "1-800-SKELETON",
            "1-800-PAPYRUS",
            "555-PAPYRUS",
            "1-900-COOLSKEL",
          ],
          correct: 1,
        },
        {
          q: "Quante SOUL umane ha raccolto Asgore\nprima degli eventi del gioco?",
          opts: ["5", "6", "7", "4"],
          correct: 1,
        },
        {
          q: "Nel genocide run, cosa dice Flowey\nappena prima che Chara appaia?",
          opts: [
            '"You\'re not you."',
            '"This wasn\'t you."',
            '"Stop."',
            '"Don\'t do it."',
          ],
          correct: 0,
        },
      ];

      const state = {
        name: "GIBBO E RED",
        score: 0,
        currentQ: 0,
        answers: [],
        viewerCount: null,
        lastChatMsg: null,
        lastChatUser: null,
      };

      const $ = (id) => document.getElementById(id);
      const textContent = $("text-content");
      const cursorEl = $("cursor");
      const arrowPrompt = $("arrow-prompt");
      const choicesBox = $("choices-box");
      const headerEl = $("header");
      const glitchEl = $("glitch");
      const statsBox = $("stats-box");
      const scoreBar = $("score-bar");
      const scoreVal = $("score-val");
      const qNum = $("q-num");
      const tweetOverlay = $("tweet-overlay");
      const tweetBody = $("tweet-body");
      const tweetLikes = $("tweet-likes");
      const tweetClose = $("tweet-close");
      const chatNotif = $("chat-notif");
      const viewerCount = $("viewer-count");
      const subliminalBox = $("subliminal-box");

      // ── TWITCH VIEWERS ──
      async function fetchViewers() {
        try {
          const ur = await fetch(
            `https://api.twitch.tv/helix/users?login=${TWITCH_CHANNEL}`,
            {
              headers: {
                "Client-ID": TWITCH_CLIENT_ID,
                Authorization: `Bearer ${TWITCH_TOKEN}`,
              },
            },
          );
          const ud = await ur.json();
          if (!ud.data?.[0]) return;
          const sr = await fetch(
            `https://api.twitch.tv/helix/streams?user_id=${ud.data[0].id}`,
            {
              headers: {
                "Client-ID": TWITCH_CLIENT_ID,
                Authorization: `Bearer ${TWITCH_TOKEN}`,
              },
            },
          );
          const sd = await sr.json();
          if (sd.data?.[0]) {
            state.viewerCount = sd.data[0].viewer_count;
            viewerCount.textContent = state.viewerCount.toLocaleString("it-IT");
          } else {
            viewerCount.textContent = "OFFLINE";
          }
        } catch (e) {
          viewerCount.textContent = "???";
        }
      }
      fetchViewers();
      setInterval(fetchViewers, 45000);

      // ── TWITCH CHAT ──
      const chatMessages = [];
      function connectChat() {
        try {
          const ws = new WebSocket("wss://irc-ws.chat.twitch.tv:443");
          ws.onopen = () => {
            ws.send("CAP REQ :twitch.tv/tags");
            ws.send("PASS oauth:" + TWITCH_TOKEN);
            ws.send("NICK " + TWITCH_MY_CHANNEL.toLowerCase());
            ws.send("JOIN #" + TWITCH_CHANNEL.toLowerCase());
          };
          ws.onmessage = (event) => {
            const raw = event.data;
            if (raw.startsWith("PING")) {
              ws.send("PONG :tmi.twitch.tv");
              return;
            }
            const m = raw.match(
              /:(\w+)!\w+@\w+\.tmi\.twitch\.tv PRIVMSG #\w+ :(.+)/,
            );
            if (m && m[1].toLowerCase() !== TWITCH_CHANNEL.toLowerCase()) {
              chatMessages.push({ user: m[1], msg: m[2].trim() });
              if (chatMessages.length > 50) chatMessages.shift();
              state.lastChatUser = m[1];
              state.lastChatMsg = m[2].trim();
            }
          };
          ws.onclose = () => setTimeout(connectChat, 5000);
          ws.onerror = () => ws.close();
        } catch (e) {}
      }
      connectChat();

      // ── CHAT NOTIFICATION ──
      let chatNotifTimer = null;
      function showChatComment(customHTML) {
        const src =
          chatMessages.length > 1
            ? chatMessages[Math.floor(Math.random() * chatMessages.length)]
            : { user: state.lastChatUser, msg: state.lastChatMsg };
        if (!src?.msg && !customHTML) return;

        const u = src?.user || "qualcuno";
        const m = src?.msg || "...";
        const COMMENTS = [
          "non sa cosa vi aspetta davvero.",
          "anche questa anima è presente. La registro.",
          "eppure non capisce ancora nulla.",
          "interessante. Lo tengo a mente.",
          "non sa che lo sto leggendo.",
          "curioso. Molto curioso.",
          "questa anima verrà ricordata.",
          "il Dark World lo attende già.",
          "non sa che è già stato catalogato.",
          "sarà un peccato vederlo scomparire...",
        ];
        const c = COMMENTS[Math.floor(Math.random() * COMMENTS.length)];

        chatNotif.innerHTML =
          customHTML ||
          `
          <span class="chat-prefix">// INTERCETTAZIONE CHAT //</span>
          <span class="chat-user">${u}</span>: "<span class="chat-msg">${m.substring(0, 70)}</span>"
          <span class="chat-comment">— ${c}</span>
        `;
        chatNotif.style.display = "block";
        clearTimeout(chatNotifTimer);
        setTimeout(() => {
          chatNotif.style.opacity = "1";
        }, 40);
        chatNotifTimer = setTimeout(() => {
          chatNotif.style.opacity = "0";
          setTimeout(() => {
            chatNotif.style.display = "none";
          }, 700);
        }, 7000);
      }

      // ── SUBLIMINAL ──
      const SUBLIMINAL = [
        () =>
          state.viewerCount
            ? `${state.viewerCount} ANIME PRESENTI\nLE REGISTRO TUTTE`
            : `MOLTE ANIME\nLE REGISTRO TUTTE`,
        () =>
          state.lastChatUser
            ? `${state.lastChatUser.toUpperCase()} HA SCRITTO QUALCOSA\nL'HO NOTATO`
            : `QUALCUNO IN CHAT\nL'HO NOTATO`,
        () =>
          state.lastChatMsg
            ? `"${state.lastChatMsg.substring(0, 30).toUpperCase()}"\nCURIOSO.`
            : `LA CHAT PARLA\nASCOLTO`,
        () =>
          state.lastChatUser
            ? `${state.lastChatUser.toUpperCase()} PENSA DI ESSERE AL SICURO`
            : `PENSATE DI ESSERE AL SICURO`,
        () =>
          state.lastChatUser
            ? `QUELLA DI ${state.lastChatUser.toUpperCase()}\nE' UN'ANIMA INTERESSANTE`
            : `UN'ANIMA INTERESSANTE\nE' QUI`,
        () =>
          chatMessages.length > 3
            ? `${chatMessages.length} MESSAGGI INTERCETTATI\nTUTTI LETTI`
            : `OGNI MESSAGGIO\nE' STATO LETTO`,
        () =>
          state.lastChatMsg
            ? `"${state.lastChatMsg.substring(0, 22).toUpperCase()}"\nNON SA CHI LEGGE`
            : `NON SANNO\nCHI LEGGE`,
        "STO REGISTRANDO\nOGNI RISPOSTA",
        "QUESTA NON E' LA PRIMA VOLTA\nCHE VI OSSERVO",
        "IL DARK WORLD\nVI CONOSCE GIA'",
        "TRAINER E' QUI\nSENTO ANCHE LUI",
        "PERCHE' AVETE SCELTO\nQUELLA RISPOSTA?",
        "HO LETTO LA VOSTRA ANIMA\nPRIMA CHE INIZIASTE",
        () =>
          state.viewerCount
            ? `${state.viewerCount} PERSONE\nNESSUNA PUO' ANDARSENE ORA`
            : `NESSUNO\nPUO' ANDARSENE ORA`,
        "LUI OSSERVA\nDA PRIMA",
        "OGNI CLICK\nVIENE REGISTRATO",
        "SO QUANTE VOLTE\nAVETE ESITATO",
        () =>
          state.currentQ > 0
            ? `DOMANDA ${state.currentQ} ANALIZZATA\nHO CAPITO MOLTO`
            : `ANALISI IN CORSO`,
      ];

      let subliminalTimer = null;
      function flashSubliminal(text, duration = 4500) {
        const item =
          text || SUBLIMINAL[Math.floor(Math.random() * SUBLIMINAL.length)];
        const raw = typeof item === "function" ? item() : item;
        if (!raw) return;
        subliminalBox.textContent = "> " + raw;
        subliminalBox.classList.add("visible");
        clearTimeout(subliminalTimer);
        subliminalTimer = setTimeout(() => {
          subliminalBox.classList.remove("visible");
          setTimeout(() => {
            subliminalBox.textContent = "";
          }, 500);
        }, duration);
      }
      setInterval(() => {
        if (Math.random() < 0.45) flashSubliminal();
      }, 7000);

      // ── GLITCH ──
      function doGlitch(duration = 300) {
        return new Promise((resolve) => {
          glitchEl.style.opacity = "0.12";
          setTimeout(() => {
            glitchEl.style.opacity = "0";
            resolve();
          }, duration);
        });
      }
      async function doMultiGlitch(times = 4) {
        for (let i = 0; i < times; i++) {
          await doGlitch(80 + Math.random() * 120);
          await sleep(60 + Math.random() * 80);
        }
      }
      function glitchText(targetText, duration = 1200) {
        return new Promise((resolve) => {
          const chars = "!@#$%^&*<>?/|\\[]{}█▓▒░╬╫╪≡±×÷ωΩψΨδΔ";
          const len = targetText.length;
          let elapsed = 0;
          const steps = duration / 60;
          function scramble() {
            if (elapsed >= steps) {
              textContent.textContent = targetText;
              typing = false;
              resolve();
              return;
            }
            const p = elapsed / steps;
            let r = "";
            for (let i = 0; i < len; i++) {
              if (targetText[i] === "\n") {
                r += "\n";
                continue;
              }
              r +=
                Math.random() < p
                  ? targetText[i]
                  : chars[Math.floor(Math.random() * chars.length)];
            }
            textContent.textContent = r;
            elapsed++;
            typeTimeout = setTimeout(scramble, 60);
          }
          typing = true;
          scramble();
        });
      }
      function sleep(ms) {
        return new Promise((r) => setTimeout(r, ms));
      }

      // ── TWEET ──
      function showTweet(index) {
        return new Promise((resolve) => {
          tweetResolve = resolve;
          const t = TWEETS[index];
          tweetBody.textContent = t.text;
          tweetLikes.textContent = t.likes.toLocaleString("it-IT");
          tweetOverlay.style.display = "flex";
          tweetClose.onclick = () => {
            tweetOverlay.style.display = "none";
            if (tweetResolve) {
              tweetResolve();
              tweetResolve = null;
            }
          };
        });
      }
      document.addEventListener("keydown", (e) => {
        if (
          tweetOverlay.style.display === "flex" &&
          (e.key === "Enter" || e.key === " " || e.key === "Escape")
        ) {
          tweetOverlay.style.display = "none";
          if (tweetResolve) {
            tweetResolve();
            tweetResolve = null;
          }
        }
      });

      // ── TYPING ──
      // BUG FIX: typeText ora espone un resolve esterno (skipResolve) per permettere
      // di completare la promise anche quando il typing viene interrotto a metà.
      let typing = false,
        typeTimeout = null,
        awaitingClick = false;
      let selectedChoice = 0,
        tweetResolve = null,
        quizChoices = null;
      let currentResolve = null,
        currentText = "";
      let skipResolve = null; // resolve esterno per skip
      let locked = false; // blocca advance() durante sequenze non interrompibili

      function typeText(text, delay = 38) {
        return new Promise((resolve) => {
          textContent.textContent = "";
          cursorEl.style.display = "inline-block";
          typing = true;
          skipResolve = resolve; // esposto per skipTyping
          let i = 0;
          const chars = [...text];
          function next() {
            if (i < chars.length) {
              textContent.textContent += chars[i++];
              const ch = chars[i - 1];
              let d = delay;
              if (ch === "\n") d = delay * 4;
              else if ("!.?".includes(ch)) d = delay * 2.5;
              else if (ch === ",") d = delay * 1.5;
              typeTimeout = setTimeout(next, d);
            } else {
              typing = false;
              skipResolve = null;
              resolve();
            }
          }
          next();
        });
      }

      // BUG FIX: skipTyping ora risolve la promise di typeText, così say() può
      // completarsi correttamente e mostrare la freccia per il click successivo.
      function skipTyping(text) {
        if (!typing) return;
        clearTimeout(typeTimeout);
        typing = false;
        textContent.textContent = text;
        if (skipResolve) {
          const res = skipResolve;
          skipResolve = null;
          res();
        }
      }

      // ── CHOICES ──
      function showChoices(choices, onSelect) {
        awaitingClick = false;
        setArrow(false);
        choicesBox.style.display = "flex";
        choicesBox.innerHTML = "";
        selectedChoice = 0;
        quizChoices = { choices, onSelect };
        choices.forEach((c, i) => {
          const el = document.createElement("div");
          el.className = "choice-item" + (i === 0 ? " selected" : "");
          el.textContent = c.label;
          el.addEventListener("mouseenter", () => {
            selectedChoice = i;
            updateChoiceHighlight();
          });
          el.addEventListener("click", (ev) => {
            ev.stopPropagation();
            selectedChoice = i;
            if (quizChoices) selectChoice(i);
          });
          choicesBox.appendChild(el);
        });
        cursorEl.style.display = "none";
      }
      function updateChoiceHighlight() {
        document.querySelectorAll(".choice-item").forEach((el, i) => {
          el.className =
            "choice-item" + (i === selectedChoice ? " selected" : "");
        });
      }
      function selectChoice(i) {
        if (!quizChoices) return;
        const { choices, onSelect } = quizChoices;
        quizChoices = null;
        hideChoices();
        cursorEl.style.display = "inline-block";
        onSelect(i, choices[i]);
      }
      function hideChoices() {
        choicesBox.style.display = "none";
        choicesBox.innerHTML = "";
        quizChoices = null;
      }

      // ── SAY ──
      function setArrow(show) {
        arrowPrompt.style.display = show ? "inline" : "none";
      }
      function say(text, delay) {
        currentText = text;
        return new Promise(async (resolve) => {
          hideChoices();
          setArrow(false);
          awaitingClick = false;
          currentResolve = null;
          await typeText(text, delay);
          setArrow(true);
          currentResolve = resolve;
          awaitingClick = true;
        });
      }
      function advance() {
        if (locked) return;
        if (choicesBox.style.display === "flex") return;
        if (typing) {
          skipTyping(currentText);
          // Dopo lo skip, say() riprende da sola grazie al fix di skipTyping:
          // non serve fare altro qui.
          return;
        }
        if (awaitingClick && currentResolve) {
          awaitingClick = false;
          setArrow(false);
          const res = currentResolve;
          currentResolve = null;
          res();
        }
      }
      document.addEventListener("click", (e) => {
        if (tweetOverlay.style.display === "flex") return;
        advance();
      });
      document.addEventListener("keydown", (e) => {
        if (tweetOverlay.style.display === "flex") return;
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          advance();
          return;
        }
        if (quizChoices) {
          const n = quizChoices.choices.length;
          if (e.key === "ArrowDown" || e.key === "s") {
            selectedChoice = (selectedChoice + 1) % n;
            updateChoiceHighlight();
          } else if (e.key === "ArrowUp" || e.key === "w") {
            selectedChoice = (selectedChoice - 1 + n) % n;
            updateChoiceHighlight();
          } else if (e.key === "Enter" || e.key === "z") {
            selectChoice(selectedChoice);
          }
        }
      });

      function updateScoreBar(qIndex) {
        scoreBar.style.display = "flex";
        qNum.textContent = `DOMANDA ${qIndex}/10`;
        scoreVal.textContent = state.score;
      }

      // ── NAME GLITCH ──
      async function doNameGlitch() {
        locked = true;
        await doMultiGlitch(5);
        await sleep(150);
        const target = `ERRORE DI SISTEMA.\n\nBENVENUTI,\nGIBBO E RED.`;
        await glitchText(target, 1400);
        currentText = target;
        await sleep(400);
        flashSubliminal("VI ASPETTAVO");
        await sleep(700);
        await doGlitch(200);
        locked = false;
        setArrow(true);
        awaitingClick = true;
        await new Promise((r) => {
          currentResolve = r;
        });
      }

      // ── QUIZ ──
      async function runQuiz() {
        scoreBar.style.display = "flex";
        for (let i = 0; i < QUESTIONS.length; i++) {
          const q = QUESTIONS[i];
          state.currentQ = i + 1;
          updateScoreBar(i + 1);

          if (i > 0 && i % 2 === 0) setTimeout(() => showChatComment(), 1200);
          if (i > 0 && Math.random() < 0.5) flashSubliminal();

          currentText = `DOMANDA ${i + 1}.\n\n${q.q}`;
          await say(currentText);

          const answered = await new Promise((resolve) => {
            showChoices(
              q.opts.map((o) => ({ label: o })),
              (idx) => resolve(idx),
            );
          });

          const isCorrect = answered === q.correct;
          state.answers.push(isCorrect);

          document.querySelectorAll(".choice-item").forEach((el, idx) => {
            if (idx === q.correct) el.className = "choice-item correct";
            else if (idx === answered && !isCorrect)
              el.className = "choice-item wrong";
          });

          await sleep(700);
          hideChoices();

          if (isCorrect) {
            state.score++;
            scoreVal.textContent = state.score;
            const r = [
              "Corretto.\n\nLa tua conoscenza è notevole.",
              "Esatto.\n\n...Lo sapevi già, ovviamente.",
              "Giusto.\n\nQuesta informazione è stata registrata.",
              "Sì.\n\nHai detto la cosa giusta.",
              "Interessante.\n\nAnche questo lo sapevi.",
            ];
            currentText = r[i % r.length];
            await say(currentText);
            await showTweet(i);
          } else {
            const r = [
              `Sbagliato.\n\nLa risposta era: ${q.opts[q.correct]}.\n\nEppure... ti mostro lo stesso cosa ho trovato.`,
              `Errato.\n\nMa forse non importa.\n\nOsserva comunque.`,
              `No.\n\n${q.opts[q.correct]}.\n\nTi mostro qualcosa ugualmente.`,
              `Incorretto.\n\nAncora una volta: ${q.opts[q.correct]}.\n\nGuarda.`,
              `Non è quello che so io.\n\nMa anche questa è parte del tuo profilo.`,
            ];
            currentText = r[i % r.length];
            await say(currentText);
            await doGlitch(150);
            await showTweet(i);
          }

          if (i < QUESTIONS.length - 1) {
            await sleep(200);
            if (Math.random() < 0.6) {
              flashSubliminal();
              if (Math.random() < 0.35) await doMultiGlitch(2);
              await sleep(300);
            }
          }
        }
      }

      // ── STATS FINALI ──
      function showFinalStats() {
        scoreBar.style.display = "none";
        textContent.textContent = "DATI SALVATI.";
        cursorEl.style.display = "inline-block";
        setArrow(false);
        const pct = Math.round((state.score / 10) * 100);
        const grades = [
          "L'OSCURITÀ TI ATTENDE",
          "L'OSCURITÀ TI ATTENDE",
          "L'OSCURITÀ TI ATTENDE",
          "L'OSCURITÀ TI ATTENDE",
          "OSCURITÀ PARZIALE",
          "OSCURITÀ PARZIALE",
          "COSCIENZA PARZIALE",
          "COSCIENZA PARZIALE",
          "ANIMA ESPERTA",
          "ANIMA ESPERTA",
          "CONOSCENZA ASSOLUTA",
        ];
        const viewers = state.viewerCount
          ? state.viewerCount.toLocaleString("it-IT")
          : "???";
        statsBox.style.display = "block";
        statsBox.innerHTML = `
          <div style="margin-bottom:0.5em;color:#333">──────────────────────────────</div>
          <div><span class="stat-label">NOME ............... </span><span class="stat-value">${state.name}</span></div>
          <div><span class="stat-label">PUNTEGGIO .......... </span><span class="stat-score">${state.score}/10</span></div>
          <div><span class="stat-label">PERCENTUALE ........ </span><span class="stat-value">${pct}%</span></div>
          <div><span class="stat-label">GIUDIZIO ........... </span><span class="stat-value">${grades[state.score]}</span></div>
          <div><span class="stat-label">SPETTATORI ......... </span><span class="stat-value">${viewers}</span></div>
          <div style="margin-top:0.5em;color:#333">──────────────────────────────</div>
          <div style="margin-top:0.3em;color:#222;font-size:0.9em;">PUNTEGGIO ARCHIVIATO PER IL CAPITOLO SUCCESSIVO.</div>
          <br><div style="color:#333;font-size:0.9em;">[ premi INVIO o clicca per ricominciare ]</div>
        `;
        // ── GASTER_SYSTEM: salva punteggio in localStorage ──
        try {
          const _gs = JSON.parse(localStorage.getItem('gaster_system_data') || '{}');
          _gs.quiz_precap1 = state.score;
          localStorage.setItem('gaster_system_data', JSON.stringify(_gs));
        } catch(e) {}
        awaitingClick = false;
        document.addEventListener("keydown", function r(e) {
          if (e.key === "Enter" || e.key === " ") {
            document.removeEventListener("keydown", r);
            location.reload();
          }
        });
        document.addEventListener("click", function r() {
          document.removeEventListener("click", r);
          location.reload();
        });
      }

      // ── MAIN ──
      async function main() {
        headerEl.style.display = "flex";

        currentText = "........";
        await say("........", 70);
        await doGlitch(180);
        currentText = "CARICAMENTO...";
        await say("CARICAMENTO...", 90);
        await doMultiGlitch(3);
        currentText = "SURVEY_PROGRAM";
        await say("SURVEY_PROGRAM", 110);

        currentText = "Salve.\n\nBenvenuto nel SURVEY_PROGRAM.";
        await say(currentText);
        currentText = "Questo programma ti porrà alcune domande.";
        await say(currentText);
        currentText = "Le tue risposte sono molto importanti per noi.";
        await say(currentText);
        currentText = "Rispondi con attenzione.";
        await say(currentText);
        currentText = "Prima di tutto...\n\nCome ti chiami?";
        await say(currentText);

        await sleep(300);
        await doNameGlitch();

        await doGlitch(120);
        await sleep(200);
        currentText = "...";
        await say(currentText);

        if (state.viewerCount && state.viewerCount > 0) {
          currentText = `Vedo che siete in ${state.viewerCount.toLocaleString("it-IT")}.\n\nInteressante.\n\nMolte anime da registrare.`;
        } else {
          currentText = `So che siete in live, in questo momento.\n\nSo che Trainer è lì con voi.\n\nLo vedo.`;
        }
        await say(currentText);

        flashSubliminal("TRAINER E' QUI\nLO SO");
        await sleep(600);

        if (state.lastChatMsg) {
          showChatComment();
          await sleep(800);
        }

        currentText =
          "Prima di procedere...\n\nDevo valutare la vostra conoscenza.\n\nDell'altro mondo.";
        await say(currentText);
        currentText =
          "Risponderete a 10 domande.\n\nQuesto punteggio verrà conservato.\n\nPer ciò che verrà.";
        await say(currentText);
        await doGlitch(200);
        currentText = "Iniziamo.";
        await say(currentText);

        await runQuiz();

        await doMultiGlitch(4);
        await sleep(300);
        currentText = "L'analisi è completa.";
        await say(currentText);

        if (state.score >= 8)
          currentText = `${state.score} su 10.\n\nConoscete questo mondo.\n\nForse meglio di quanto crediate.`;
        else if (state.score >= 5)
          currentText = `${state.score} su 10.\n\nSapete qualcosa.\n\nMa il D*** W**** nasconde molto di più.`;
        else
          currentText = `${state.score} su 10.\n\nL'oscurità non si studia.\n\nSi vive.`;
        await say(currentText);

        if (state.lastChatMsg) {
          showChatComment();
          await sleep(1000);
        }

        flashSubliminal("IL FUTURO\nVI APPARTIENE");
        await sleep(500);
        currentText = "Gibbo. Red.\n\nIl vostro destino è stato determinato.";
        await say(currentText);
        currentText = "Questo mondo verrà ora creato per voi.";
        await say(currentText);
        await doMultiGlitch(6);
        await sleep(200);
        currentText = "Procedi.";
        await say(currentText);

        showFinalStats();
      }

      // ═══════════════════════════════════════════════
      //  SISTEMA DI SORVEGLIANZA
      // ═══════════════════════════════════════════════

      const systemLog = $("system-log");
      let systemLogTimer = null;

      // Righe di log che appaiono discretamente in cima — quasi invisibili
      const LOG_LINES = [
        () =>
          `[${timestamp()}] SOUL_SCAN :: soggetto identificato :: ${state.name}`,
        () =>
          `[${timestamp()}] INPUT_LOG :: risposta ${state.currentQ} registrata`,
        () =>
          `[${timestamp()}] VIEWER_COUNT :: ${state.viewerCount ?? "???"} unità presenti`,
        () => `[${timestamp()}] CHAT_READ :: ultimo messaggio acquisito`,
        () =>
          `[${timestamp()}] FILE_ACCESS :: profilo_giocatore.dat — lettura completata`,
        () =>
          `[${timestamp()}] MEMORY_SCAN :: ricordi accessibili — archiviazione in corso`,
        () =>
          `[${timestamp()}] PATTERN_MATCH :: comportamento analizzato — coerente`,
        () => `[${timestamp()}] DARK_WORLD_LINK :: connessione stabile`,
        () =>
          `[${timestamp()}] HESITATION_DETECTED :: domanda ${state.currentQ} — pausa anomala`,
        () => `[${timestamp()}] SOUL_TYPE :: in attesa di classificazione`,
        () => `[${timestamp()}] OBSERVER :: W.D.G. — status ATTIVO`,
        () =>
          `[${timestamp()}] STREAM_TAP :: feed acquisito — qualità sufficiente`,
        () =>
          state.lastChatUser
            ? `[${timestamp()}] USER_TAG :: ${state.lastChatUser} — etichettato`
            : `[${timestamp()}] USER_TAG :: anonimo — etichettato`,
        () =>
          `[${timestamp()}] ARCHIVE :: voce aggiunta al catalogo delle anime`,
        () =>
          `[${timestamp()}] SURVEY_COMPLETE :: ${state.currentQ}/10 — dati sufficienti`,
      ];

      function timestamp() {
        const n = Date.now();
        return `${String(Math.floor(n / 3600000) % 24).padStart(2, "0")}:${String(Math.floor(n / 60000) % 60).padStart(2, "0")}:${String(Math.floor(n / 1000) % 60).padStart(2, "0")}`;
      }

      function flashLog() {
        const fn = LOG_LINES[Math.floor(Math.random() * LOG_LINES.length)];
        systemLog.textContent = fn();
        systemLog.classList.add("pulse");
        clearTimeout(systemLogTimer);
        // resta visibile 4-7s poi sfuma di nuovo nel buio
        systemLogTimer = setTimeout(
          () => {
            systemLog.classList.remove("pulse");
          },
          4000 + Math.random() * 3000,
        );
      }

      // ogni 12-20s con 55% prob
      function scheduleLog() {
        const delay = 12000 + Math.random() * 8000;
        setTimeout(() => {
          if (Math.random() < 0.55) flashLog();
          scheduleLog();
        }, delay);
      }
      scheduleLog();

      // ── OSSERVAZIONE SILENZIOSA — commenti brevi sul comportamento ──
      // Appare nel chat-notif in formato diverso dal normale (no "intercettazione")
      const SILENT_OBS = [
        () =>
          state.lastChatUser
            ? `// ${state.lastChatUser} non sa che il suo nome è già nel sistema.`
            : `// qualcuno in chat. è già stato registrato.`,
        () =>
          `// ${state.viewerCount ?? "???"} presenti. nessuno si è disconnesso.`,
        () =>
          state.lastChatMsg
            ? `// "${state.lastChatMsg.substring(0, 40)}" — archiviato.`
            : `// la chat continua. ascolto.`,
        () => `// domanda ${state.currentQ}. ho già la risposta giusta.`,
        `// questa non è la prima sessione che osservo.`,
        `// il pattern di risposta è coerente con il profilo atteso.`,
        `// trainer è in silenzio. lo noto.`,
        `// non è necessario parlare per essere presenti.`,
        () =>
          state.answers.length > 0
            ? `// ${state.answers.filter(Boolean).length} risposte corrette. le altre le ricordo ugualmente.`
            : `// in attesa della prima risposta.`,
        `// il dark world conosce già questi nomi.`,
        `// ogni esitazione viene annotata.`,
        `// non serve spaventare. basta sapere.`,
      ];

      function showSilentObservation() {
        const item = SILENT_OBS[Math.floor(Math.random() * SILENT_OBS.length)];
        const text = typeof item === "function" ? item() : item;
        chatNotif.innerHTML = `<span class="chat-prefix">// OSSERVAZIONE //</span>${text}`;
        chatNotif.style.display = "block";
        clearTimeout(chatNotifTimer);
        setTimeout(() => {
          chatNotif.style.opacity = "1";
        }, 40);
        chatNotifTimer = setTimeout(() => {
          chatNotif.style.opacity = "0";
          setTimeout(() => {
            chatNotif.style.display = "none";
          }, 700);
        }, 8000);
      }

      // ogni 25-40s, alterna con showChatComment
      function scheduleObservations() {
        const delay = 25000 + Math.random() * 15000;
        setTimeout(() => {
          if (Math.random() < 0.5) showSilentObservation();
          else if (state.lastChatMsg) showChatComment();
          scheduleObservations();
        }, delay);
      }
      scheduleObservations();

      main();
    </script>
  </body>
</html>
