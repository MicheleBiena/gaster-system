<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />

    <title>PRE-CAP 2 — GASTER SYSTEM</title>
    <link rel="stylesheet" href="../../assets/style.css" />
    <style>
      .nav-grid {
        width: 100%;
        max-width: 700px;
        display: flex;
        flex-direction: column;
        gap: 0;
      }

      .nav-card {
        display: grid;
        grid-template-columns: 36px 1fr auto;
        align-items: center;
        gap: 1em;
        padding: 1.1em 1em;
        border: 2px solid var(--text);
        border-bottom: none;
        text-decoration: none;
        color: var(--text);
        transition: background 0.05s;
      }

      .nav-card:last-child {
        border-bottom: 2px solid var(--text);
      }
      .nav-card:hover {
        background: #0d0d0d;
        cursor: pointer;
      }

      .nav-index {
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--dim);
        letter-spacing: 0.1em;
        text-align: right;
      }

      .nav-info {
        display: flex;
        flex-direction: column;
        gap: 0.2em;
      }

      .nav-title {
        font-family: var(--font-display);
        font-size: 1.6em;
        letter-spacing: 0.08em;
      }

      .nav-desc {
        font-family: var(--font-mono);
        font-size: 12px;
        color: var(--dim);
        letter-spacing: 0.08em;
      }

      .nav-arrow {
        font-family: var(--font-mono);
        font-size: 16px;
        color: var(--dim);
      }
    </style>
  </head>
  <body>

              font-size: 0.75em;

              letter-spacing: 0.1em;
            "
            >← INDIETRO</a
          >
          &nbsp;&nbsp;PRE-CAP 2 — DELTARUNE CAP.1
        </span>
        <span id="header-sub">documentazione · prima del capitolo 2</span>
      </header>

      <nav class="nav-grid">
        <a class="nav-card" href="personaggi.html">

          <div class="nav-info">
            <div class="nav-title">PERSONAGGI</div>

          <div class="nav-arrow">→</div>
        </a>
      </nav>

      <footer id="site-footer">
        <span>GASTER_SYSTEM // PRE-CAP 2</span>
      </footer>
    </div>

    <script src="../../assets/main.js"></script>
  </body>
