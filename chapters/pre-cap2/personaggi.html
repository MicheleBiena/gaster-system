<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PERSONAGGI — GASTER SYSTEM</title>
    <link rel="stylesheet" href="../../assets/style.css" />

    <style>
     .card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
  gap: 2.5em;
  width: 100%;
  max-width: 1000px;
  margin-top: 2em;
}

.card {
  perspective: 1200px;
  position: relative;
}

/* RAPPORTO PIÙ VERTICALE */
.card-inner {
  position: relative;
  width: 100%;
  height: 420px; /* prima 320px */
  transition: transform 0.6s;
  transform-style: preserve-3d;
}

.card:hover .card-inner {
  transform: rotateY(180deg);
}

/* CRT effect invariato ma leggermente più visibile */
.card::after {
  content: "";
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.06) 0px,
    rgba(255,255,255,0.06) 1px,
    transparent 2px
  );
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.15s;
}

.card:hover::after {
  opacity: 1;
}

.card-face {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  border: 2px solid var(--text);
  padding: 1.2em;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  background: black;
}

.card-back {
  transform: rotateY(180deg);
  background: #0d0d0d;
}

/* TIPOGRAFIA PIÙ LARGA / IMPATTANTE */
.card-title {
  font-family: var(--font-display);
  font-size: 1.6em;
  letter-spacing: 0.12em; /* più largo */
  line-height: 1.1;
}

/* IMMAGINE PIÙ PROTAGONISTA */
.card-img {
  flex: 1;
  border: 1px solid var(--dim);
  margin: 1.2em 0;
  overflow: hidden;
}

.card-img img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  filter: contrast(1.15) brightness(0.85);
}

/* TESTO PIÙ LEGGIBILE */
.card-desc {
  font-family: var(--font-mono);
  font-size: 13px; /* leggermente più grande */
  color: var(--dim);
  letter-spacing: 0.07em; /* più largo */
  line-height: 1.4;
}

.card-stats {
  font-family: var(--font-mono);
  font-size: 12px;
  display: flex;
  flex-direction: column;
  gap: 0.4em;
  letter-spacing: 0.08em;
}
    </style>
  </head>

  <body>
    <div id="scanlines"></div>
    <div id="vignette"></div>

    <div id="screen">
      <header id="site-header">
        <span id="header-title">
          <a href="index.html" class="back-link">← INDIETRO</a>
          &nbsp;&nbsp;PERSONAGGI
        </span>
        <span id="header-sub">database · deltarune</span>
      </header>

      <main class="card-grid" id="card-container"></main>

      <footer id="site-footer">
        <span>GASTER_SYSTEM // PERSONAGGI</span>
      </footer>
    </div>

    <script>
      async function loadCharacters() {
        const res = await fetch("personaggi.json");
        const data = await res.json();

        const container = document.getElementById("card-container");

        data.forEach(char => {
          const card = document.createElement("div");
          card.className = "card";

          card.innerHTML = `
            <div class="card-inner">
              <div class="card-face">
                <div class="card-title">${char.nome}</div>
                <div class="card-img">
                  <img src="${char.img}" alt="${char.nome}" />
                </div>
                <div class="card-desc">${char.desc}</div>
              </div>

              <div class="card-face card-back">
                <div class="card-title">DATI</div>
                <div class="card-stats">
                  <div>Specie: ${char.specie}</div>
                </div>
                <div class="card-desc">${char.note}</div>
              </div>
            </div>
          `;

          container.appendChild(card);
        });
      }

      loadCharacters();
    </script>

    <script src="../../assets/main.js"></script>
  </body>
</html>
